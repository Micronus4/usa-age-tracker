<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USA Age Tracker & Celebration</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b111e; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #f8fafc;
            overflow: hidden;
            position: relative;
        }
        
        /* Enhanced Card Design with modern layout structure */
        .card {
            background: linear-gradient(135deg, rgba(22, 34, 57, 0.95) 0%, rgba(13, 20, 35, 0.95) 100%);
            padding: 55px; 
            border-radius: 24px; 
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 0 1px 1px rgba(255, 255, 255, 0.1) inset,
                0 10px 30px -10px rgba(0, 0, 0, 0.7),
                0 40px 80px -15px rgba(0, 0, 0, 0.6);
            max-width: 740px; 
            width: 100%;
            height: 480px; 
            z-index: 10;
            backdrop-filter: blur(12px); 
            overflow: hidden; 
            box-sizing: border-box;
            
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Ambient glow inside the card matching the aesthetic */
        .card::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* Faint American Flag background sourced from Wikipedia */
        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            opacity: 0.05; 
            pointer-events: none;
            background-image: url('https://upload.wikimedia.org/wikipedia/en/a/a4/Flag_of_the_United_States.svg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        h1 {
            font-size: 3.25rem; 
            margin: 0; 
            color: #ffffff;
            font-weight: 800; 
            letter-spacing: -1px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        /* Central metric tracking container absolute centered on coordinate canvas */
        .age-display {
            position: absolute; 
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            z-index: 20;
        }
        
        .time-unit {
            font-size: 2.1rem; 
            font-weight: 700; 
            font-style: italic; 
            color: #ffffff;
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.12);  
            padding: 14px 28px; 
            border-radius: 14px;
            width: 68%; 
            height: 74px; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            white-space: nowrap; 
            cursor: pointer;
            box-sizing: border-box; 
            box-shadow: 
                0 4px 6px -1px rgba(0, 0, 0, 0.2), 
                0 2px 4px -1px rgba(0, 0, 0, 0.1),
                0 0 12px rgba(56, 189, 248, 0.05);
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .time-unit:hover {
            transform: scale(1.025);
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 
                0 10px 15px -3px rgba(0, 0, 0, 0.3),
                0 0 15px rgba(56, 189, 248, 0.2);
        }
        
        .tooltip {
            visibility: hidden;
            opacity: 0;
            background-color: #090d16;
            color: #f1f5f9;
            text-align: center;
            padding: 14px 22px; 
            border-radius: 10px;
            border: 1px solid #38bdf8;
            font-size: 1.3rem; 
            font-weight: 600; 
            font-style: normal; 
            white-space: nowrap;
            position: absolute;
            bottom: 145%; 
            left: 50%;
            transform: translateX(-50%) translateY(5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1), transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.2s;
            z-index: 30;
            pointer-events: none; 
        }
        .tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -8px; 
            border-width: 8px; 
            border-style: solid;
            border-color: #38bdf8 transparent transparent transparent;
        }
        .time-unit:hover + .tooltip {
            visibility: visible;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        .countdown-container {
            text-align: center;
            margin-bottom: 12px; 
        }
        .countdown-title {
            font-size: 1.1rem; 
            color: #64748b;
            letter-spacing: 2px;
            margin-bottom: 14px;
            text-transform: uppercase;
            font-weight: 600;
        }
        .countdown-ticker {
            font-size: 1.8rem; 
            font-weight: 700;
            color: #38bdf8; 
            font-family: monospace;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }
        #fireworksCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15; 
            display: none;
        }
        .celebration-banner {
            display: none;
            background: linear-gradient(135deg, #b22234 0%, #3c3b6e 100%);
            color: white;
            padding: 15px; 
            border-radius: 9px;
            margin-top: 15px;
            font-size: 1.6rem; 
            font-weight: bold;
            animation: pulse 2s infinite;
            border: 1px solid #475569;
            text-shadow: 0 3px 6px rgba(0,0,0,0.4);
        }
        .version-tag {
            position: absolute;
            bottom: 15px;
            right: 20px;
            color: #22c55e; 
            font-family: monospace;
            font-size: 0.9rem;
            font-weight: bold;
            z-index: 20;
            user-select: none;
            opacity: 0.7;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <canvas id="fireworksCanvas"></canvas>

    <div class="card">
        <h1>USA Age Tracker</h1>
        
        <div class="age-display">
            <div id="yearBox" class="time-unit"></div>
            <div id="ageTooltip" class="tooltip"></div>
            <div id="celebrationBanner" class="celebration-banner"></div>
        </div>

        <div class="countdown-container">
            <div class="countdown-title">4th of July Countdown</div>
            <div id="countdownTicker" class="countdown-ticker">00d : 00h : 00m : 00s</div>
        </div>
    </div>

    <div class="version-tag">v40</div>

    <script>
        const targetBox = document.getElementById('yearBox');
        const tooltipBox = document.getElementById('ageTooltip');

        function getDaysInMonth(year, month) {
            return new Date(year, month + 1, 0).getDate();
        }

        function updateUSAAgeAndCountdown() {
            const birthDate = new Date(1776, 6, 4); 
            const now = new Date();

            let years = now.getFullYear() - birthDate.getFullYear();
            let months = now.getMonth() - birthDate.getMonth();
            let days = now.getDate() - birthDate.getDate();

            if (days < 0) {
                months--;
                let prevMonthYear = now.getFullYear();
                let prevMonth = now.getMonth() - 1;
                if (prevMonth < 0) {
                    prevMonth = 11;
                    prevMonthYear--;
                }
                days += getDaysInMonth(prevMonthYear, prevMonth);
            }

            if (months < 0) {
                years--;
                months += 12;
            }

            const weeks = Math.floor(days / 7);
            const remainingDays = days % 7;

            // Reverted back to checking if today is exactly the 4th of July (Month index 6 is July)
            const isJuly4th = (now.getMonth() === 6 && now.getDate() === 4);

            const banner = document.getElementById('celebrationBanner');
            if (isJuly4th) {
                banner.textContent = `🎆 Happy 4th of July! 🎆`;
                banner.style.display = 'block';
                startFireworks();
            } else {
                banner.style.display = 'none';
                stopFireworks();
            }

            function formatUnit(value, unitName) {
                if (value === 0) return null;
                return `${value} ${unitName}${value === 1 ? '' : 's'}`;
            }

            const mainYearStr = `${years} year${years === 1 ? '' : 's'}!`;
            const tooltipYearStr = `${years} year${years === 1 ? '' : 's'}${isJuly4th ? '!' : ''}`;

            const detailParts = [
                formatUnit(months, 'month'),
                formatUnit(weeks, 'week'),
                formatUnit(remainingDays, 'day')
            ].filter(unit => unit !== null);

            targetBox.textContent = mainYearStr;

            if (detailParts.length > 0) {
                let completeAgeStr = tooltipYearStr;
                if (detailParts.length === 1) {
                    completeAgeStr += `, and ${detailParts[0]}`;
                } else if (detailParts.length === 2) {
                    completeAgeStr += `, ${detailParts[0]}, and ${detailParts[1]}`;
                } else if (detailParts.length === 3) {
                    completeAgeStr += `, ${detailParts[0]}, ${detailParts[1]}, and ${detailParts[2]}`;
                }
                tooltipBox.textContent = completeAgeStr;
                tooltipBox.style.display = 'block';
            } else {
                tooltipBox.textContent = tooltipYearStr;
                tooltipBox.style.display = 'block';
            }

            let targetYear = now.getFullYear();
            if (now.getMonth() > 6 || (now.getMonth() === 6 && now.getDate() >= 5)) {
                targetYear++;
            }
            const next4th = new Date(targetYear, 6, 4, 0, 0, 0);
            const diffTime = next4th - now;

            if (diffTime <= 0 || isJuly4th) {
                document.getElementById('countdownTicker').textContent = "00d : 00h : 00m : 00s";
            } else {
                const cDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                const cHours = Math.floor((diffTime % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const cMins = Math.floor((diffTime % (1000 * 60 * 60)) / (1000 * 60));
                const cSecs = Math.floor((diffTime % (1000 * 60)) / 1000);

                const pad = num => String(num).padStart(2, '0');
                document.getElementById('countdownTicker').textContent = 
                    `${pad(cDays)}d : ${pad(cHours)}h : ${pad(cMins)}m : ${pad(cSecs)}s`;
            }
        }

        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let fireworksTimeoutId;
        let animationFrameId;
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 2.2 + 0.8;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 1.5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 0.9;
                this.decay = Math.random() * 0.012 + 0.008;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.035; 
                this.alpha -= this.decay;
            }
        }

        function triggerFireworkBatch() {
            const concurrentBursts = Math.floor(Math.random() * 4) + 1;
            
            for (let b = 0; b < concurrentBursts; b++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                
                const colors = ['#b22234', '#ffffff', '#3c3b6e', '#38bdf8', '#fbbf24'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                const particleCount = Math.floor(Math.random() * 35) + 30;
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle(x, y, color));
                }
            }

            const randomDelay = Math.random() * 600 + 300;
            fireworksTimeoutId = setTimeout(triggerFireworkBatch, randomDelay);
        }

        function animateFireworks() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let index = particles.length - 1; index >= 0; index--) {
                const particle = particles[index];
                if (particle.alpha <= 0) {
                    particles.splice(index, 1);
                } else {
                    particle.update();
                    particle.draw();
                }
            }
            animationFrameId = requestAnimationFrame(animateFireworks);
        }

        function startFireworks() {
            canvas.style.display = 'block';
            resizeCanvas();
            if (!fireworksTimeoutId) {
                triggerFireworkBatch();
                animateFireworks();
            }
        }

        function stopFireworks() {
            canvas.style.display = 'none';
            clearTimeout(fireworksTimeoutId);
            cancelAnimationFrame(animationFrameId);
            fireworksTimeoutId = null;
            particles = [];
        }

        updateUSAAgeAndCountdown();
        setInterval(updateUSAAgeAndCountdown, 1000); 
    </script>
</body>
</html>
